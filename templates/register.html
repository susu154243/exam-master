<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册 - ExamMaster</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-logo">
                <i class="fas fa-user-plus" style="font-size: 3rem; color: var(--primary-color);"></i>
            </div>
            <h1 class="auth-title">注册账号</h1>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert {% if category == 'error' %}alert-danger{% else %}alert-info{% endif %}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="post" class="auth-form" id="registerForm">
                <div class="form-group">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" id="username" name="username" class="form-control" required minlength="3" placeholder="至少3个字符">
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" id="password" name="password" class="form-control" required minlength="6" placeholder="至少6个字符">
                </div>
                <div class="form-group">
                    <label for="confirm_password" class="form-label">确认密码</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" required placeholder="再次输入密码">
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-user-plus"></i> 创建账号
                </button>
            </form>
            
            <div class="auth-footer">
                <p>已有账号？ <a href="{{ url_for('login') }}">立即登录</a></p>
            </div>
        </div>
    </div>
</body>
</html>
