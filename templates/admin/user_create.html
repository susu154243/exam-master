{% extends 'admin/base.html' %}
{% block title %}新增用户{% endblock %}
{% block content %}
<div class="admin-header"><h1><i class="fas fa-user-plus"></i> 新增用户</h1></div>
<div class="card" style="max-width: 500px;">
    <form method="post">
        <div class="form-group">
            <label class="form-label">用户名</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">角色</label>
            <select name="role" class="form-control">
                <option value="user">普通用户</option>
                <option value="admin">管理员</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 创建</button>
        <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">取消</a>
    </form>
</div>
{% endblock %}
