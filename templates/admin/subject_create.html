{% extends 'admin/base.html' %}
{% block title %}新增科目{% endblock %}
{% block content %}
<div class="admin-header"><h1><i class="fas fa-plus"></i> 新增科目</h1></div>
<div class="card" style="max-width: 500px;">
    <form method="post">
        <div class="form-group">
            <label class="form-label">名称</label>
            <input type="text" name="name" class="form-control" required placeholder="如：软考高项">
        </div>
        <div class="form-group">
            <label class="form-label">代码</label>
            <input type="text" name="code" class="form-control" required placeholder="如：ruankao_gaoxiang">
        </div>
        <div class="form-group">
            <label class="form-label">图标（emoji）</label>
            <input type="text" name="icon" class="form-control" value="📚">
        </div>
        <div class="form-group">
            <label class="form-label">描述</label>
            <textarea name="description" class="form-control" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 创建</button>
        <a href="{{ url_for('admin.subjects') }}" class="btn btn-outline-secondary">取消</a>
    </form>
</div>
{% endblock %}
